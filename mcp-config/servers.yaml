# MCP servers — the single gateway for all read-only tools. Loaded by
# src/opsgentic/mcp/loader.py into a langchain-mcp-adapters MultiServerMCPClient.
# Values support ${ENV} expansion. Cluster reads use only the "kubernetes" server;
# the remediation agent uses both "kubernetes" and "github".
servers:
  kubernetes:
    transport: streamable_http
    url: ${K8S_MCP_URL}            # e.g. http://kubernetes-mcp.opsgentic.svc:8080/mcp

  # Read-only GitHub MCP server (github/github-mcp-server) so the remediation agent
  # can read repo files/structure. Until deployed, the agent path falls back to the
  # deterministic patcher. Verify with: python -m opsgentic.mcp.diagnose
  github:
    transport: streamable_http
    url: ${GITHUB_MCP_URL}         # e.g. http://github-mcp.opsgentic.svc:8082/mcp
    headers:                       # github-mcp-server HTTP mode authenticates per-request
      Authorization: "Bearer ${GITHUB_MCP_TOKEN}"

  # Read-only Prometheus MCP server (pab1it0/prometheus-mcp-server) so the RCA/context
  # agent can query metrics (instant/range PromQL, list_metrics, metadata, targets) and
  # decide query parameters itself. The server reaches Prometheus directly via an
  # in-cluster URL (PROMETHEUS_URL) with no auth. Verify tool names/path with:
  # python -m opsgentic.mcp.diagnose
  prometheus:
    transport: streamable_http
    url: ${PROMETHEUS_MCP_URL}     # e.g. http://prometheus-mcp.opsgentic.svc:8083/mcp

  # Local dev against a kubeconfig (no deployed server) — run via stdio instead:
  # kubernetes:
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "kubernetes-mcp-server@latest", "--read-only", "--disable-destructive"]
