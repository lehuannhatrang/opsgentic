# TEMPLATE ONLY. Do not commit real values. Apply the real postgres-secrets out
# of band (Sealed/External Secrets); the real values live in the gitignored
# deploy/manifests/secrets.yaml.
#
# POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB initialize the database on
# first boot and must match the credentials in opsgentic-secrets' DATABASE_URL
# (postgresql://POSTGRES_USER:POSTGRES_PASSWORD@postgres.opsgentic.svc:5432/POSTGRES_DB).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: opsgentic
type: Opaque
stringData:
  POSTGRES_USER: "opsgentic"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "opsgentic"
