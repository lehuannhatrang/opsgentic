# TEMPLATE ONLY. Do not commit real values. In production use Sealed Secrets /
# External Secrets and apply a real opsgentic-secrets out of band. The actual
# secrets.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: opsgentic-secrets
  namespace: opsgentic
type: Opaque
stringData:
  LLM_BASE_URL: "http://vllm.vllm.svc:8000/v1"
  LLM_API_KEY: "REPLACE_ME"
  # Per-provider bot tokens (dedicated service accounts). Set the ones you use.
  # GitHub App private key (PEM). Mount it at GITHUB_APP_PRIVATE_KEY_PATH
  # (see deployment volume) or inline it as GITHUB_APP_PRIVATE_KEY.
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_ME
    -----END RSA PRIVATE KEY-----
  # Fallback PATs (used only if the App is not configured):
  # GITHUB_TOKEN: "REPLACE_ME"
  # GITEA_TOKEN: "REPLACE_ME"
  # GITLAB_TOKEN: "REPLACE_ME"
  # Read-only PAT for the github-mcp-server (repo read access for the remediation agent).
  GITHUB_MCP_TOKEN: "REPLACE_ME"
  # Durable checkpoints. Omit to use the in-memory checkpointer (single replica only).
  DATABASE_URL: "postgresql://opsgentic:REPLACE_ME@postgres.opsgentic.svc:5432/opsgentic"
