# TEMPLATE ONLY. Do not commit real values. In production use Sealed Secrets /
# External Secrets and apply a real opsgentic-secrets out of band. The actual
# secrets.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: opsgentic-secrets
  namespace: opsgentic
type: Opaque
stringData:
  LLM_BASE_URL: "http://vllm.vllm.svc:8000/v1"
  LLM_API_KEY: "REPLACE_ME"
  # GitHub auth — default: a fine-grained PAT on the target repo (Contents: RW, Pull requests: RW).
  GITHUB_TOKEN: "REPLACE_ME"
  # Optional: github-mcp read token. Defaults to GITHUB_TOKEN; set a separate read-only token here only for least-privilege.
  # GITHUB_MCP_TOKEN: "REPLACE_ME"
  # Optional (production): a GitHub App instead of the PAT. Set GITHUB_APP_ID /
  # GITHUB_APP_INSTALLATION_ID in the ConfigMap and the private key here (or mount it via
  # GITHUB_APP_PRIVATE_KEY_PATH); leave GITHUB_TOKEN empty if you use the App.
  # GITHUB_APP_PRIVATE_KEY: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   REPLACE_ME
  #   -----END RSA PRIVATE KEY-----
  # Other providers (only if you target Gitea/GitLab repos):
  # GITEA_TOKEN: "REPLACE_ME"
  # GITLAB_TOKEN: "REPLACE_ME"
  # Durable checkpoints + task queue. Omit -> in-memory + synchronous API.
  DATABASE_URL: "postgresql://opsgentic:REPLACE_ME@postgres.opsgentic.svc:5432/opsgentic"
