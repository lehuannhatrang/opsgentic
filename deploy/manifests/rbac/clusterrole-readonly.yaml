# Read-only cluster access for the tooling layer.
# Intentionally NO "secrets" resource and NO write verbs (create/update/patch/delete).
# This is the hard guard: even if an agent attempts a mutation, the API server denies it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opsgentic-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - nodes
      - namespaces
      - configmaps
      - persistentvolumeclaims
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  # Node stats/log tools (kubelet reached via the API-server proxy).
  - apiGroups: [""]
    resources: ["nodes/proxy", "nodes/stats", "nodes/metrics", "nodes/log"]
    verbs: ["get"]
  # GitOps controllers — read-only, for alert -> repo discovery.
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "ocirepositories", "helmrepositories", "buckets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
