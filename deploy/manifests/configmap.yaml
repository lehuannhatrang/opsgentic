# Non-secret configuration. Secrets (LLM_API_KEY, GIT_TOKEN, LLM_BASE_URL) live in
# the opsgentic-secrets Secret (see secret.example.yaml) — never in this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: opsgentic-config
  namespace: opsgentic
data:
  MCP_ENABLED: "true"
  MCP_CONFIG_PATH: "/app/mcp-config/servers.yaml"
  MCP_RECURSION_LIMIT: "12"
  K8S_MCP_URL: "http://kubernetes-mcp.opsgentic.svc:8080/mcp"
  GITHUB_MCP_URL: "http://github-mcp.opsgentic.svc:8080/mcp"
  DB_POOL_MAX_SIZE: "10"
  LLM_MODEL: "local-model"
  GIT_CONFIG_PATH: "/app/config/gitops.yaml"
  GITHUB_APP_ID: "4100865"
  GITHUB_APP_INSTALLATION_ID: "141487695"
  GIT_PROVIDER: "github"
  MAX_RCA_ATTEMPTS: "2"
  AUTO_APPROVE: "true"
  LOG_LEVEL: "INFO"
