apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# secret.example.yaml and job-template.yaml are templates, not part of the base apply.
resources:
  - namespace.yaml
  - rbac/serviceaccount.yaml
  - rbac/clusterrole-readonly.yaml
  - rbac/clusterrolebinding.yaml
  - mcp/serviceaccount.yaml
  - mcp/deployment.yaml
  - mcp/service.yaml
  - mcp/github-deployment.yaml
  - mcp/github-service.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - secrets.yaml

# Agent skill prompts -> opsgentic-skills ConfigMap, mounted at /app/agent-skills.
# Stable name (no hash suffix) so the Deployment's volume reference resolves across
# kustomize/ArgoCD versions. After editing a skill: kubectl rollout restart deploy/opsgentic
# (the loader reads skills once at startup, so a restart is needed regardless).
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: opsgentic-skills
    namespace: opsgentic
    files:
      - agent-skills/sre.md
      - agent-skills/gitops.md
      - agent-skills/validation.md
      - agent-skills/code.md
