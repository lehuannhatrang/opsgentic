# Read-only Kubernetes MCP server (containers/kubernetes-mcp-server). It is the ONLY
# component with cluster API access; opsgentic reaches the cluster solely through it.
# Runs under the kubernetes-mcp ServiceAccount bound to a read-only ClusterRole.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp
  namespace: opsgentic
  labels:
    app: kubernetes-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp
  template:
    metadata:
      labels:
        app: kubernetes-mcp
    spec:
      serviceAccountName: kubernetes-mcp
      containers:
        - name: kubernetes-mcp-server
          # Adjust to the published image/tag for containers/kubernetes-mcp-server.
          image: ghcr.io/containers/kubernetes-mcp-server:latest
          args: ["--read-only", "--disable-destructive", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
